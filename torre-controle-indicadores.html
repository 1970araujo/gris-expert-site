<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Controle e Indicadores de Risco — GRIS.EXPERT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D2B45; --navy-800:#0A2138; --navy-900:#071726; --navy-700:#16385A; --navy-line:#26496B;
    --gold:#C9A84C; --gold-dim:#8C6F2E; --gold-soft:#E4D3A0;
    --paper:#F3EFE6; --paper-line:#DED5B8; --ink:#20211C; --ink-soft:#585648;
    --rust:#A63D2F; --rust-soft:#F1DCD6; --ok:#3F6B4B; --ok-soft:#DCE8DD; --slate:#8FA4B8;
    --update:#2E5C8A; --update-soft:#DCE7F1;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--navy-900);color:var(--paper);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;}
  .eyebrow{font-family:'IBM Plex Mono',monospace;letter-spacing:.14em;text-transform:uppercase;font-size:11px;color:var(--gold);}
  .display{font-family:'Big Shoulders Display',sans-serif;text-transform:uppercase;font-weight:800;letter-spacing:.01em;}

  header.console{background:linear-gradient(180deg,var(--navy-800),var(--navy));border-bottom:1px solid var(--navy-line);
    padding:22px 32px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;}
  .brandmark{display:flex;align-items:center;gap:16px;}
  .brandmark .mark{width:46px;height:46px;border:1.5px solid var(--gold);border-radius:50%;position:relative;flex:none;}
  .brandmark .mark::before{content:"";position:absolute;width:26px;height:26px;top:9px;left:9px;border:1px solid var(--gold-dim);border-radius:50%;}
  .brandmark .mark::after{content:"";position:absolute;top:20px;left:20px;width:5px;height:5px;background:var(--gold);border-radius:50%;}
  .brandmark h1{font-family:'Big Shoulders Display',sans-serif;font-weight:800;font-size:20px;letter-spacing:.03em;margin:0;color:var(--paper);text-transform:uppercase;}
  .brandmark h1 span{color:var(--gold);}
  .brandmark p{margin:2px 0 0;font-size:12.5px;color:var(--slate);}
  .back-link{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--slate);text-decoration:none;text-transform:uppercase;letter-spacing:.05em;}
  .back-link:hover{color:var(--gold);}

  .radar-wrap{display:flex;align-items:center;gap:14px;}
  .radar{position:relative;width:60px;height:60px;flex:none;}
  .radar svg{width:100%;height:100%;transform:rotate(-90deg);}
  .radar .ring-bg{fill:none;stroke:var(--navy-line);stroke-width:5;}
  .radar .ring-fg{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset .6s ease;}
  .radar .rlabel{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);}
  .radar-text .t1{font-size:11.5px;color:var(--slate);margin:0;}
  .radar-text .t2{font-size:13.5px;color:var(--paper);margin:0;font-weight:500;}

  .shell{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 92px);}
  @media (max-width:860px){.shell{grid-template-columns:1fr;}}

  aside.manifest{background:var(--navy-800);border-right:1px solid var(--navy-line);padding:22px 0 40px;}
  .manifest-head{padding:0 22px 16px;border-bottom:1px solid var(--navy-line);margin-bottom:6px;}
  .manifest-head p{margin:0;font-size:13px;color:var(--slate);line-height:1.5;}

  .mod-row{display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:13px 22px;color:var(--paper);border-bottom:1px solid var(--navy-line);font-family:inherit;}
  .mod-row:hover{background:var(--navy-700);}
  .mod-row.active{background:var(--navy-700);box-shadow:inset 3px 0 0 var(--gold);}
  .mod-row .row-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .mod-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);}
  .mod-title{font-size:13.5px;font-weight:500;margin:3px 0 0;line-height:1.3;}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;padding:3px 8px;border-radius:20px;text-transform:uppercase;flex:none;}
  .pill.live{background:rgba(201,168,76,.16);color:var(--gold);border:1px solid var(--gold-dim);}
  .pill.soon{background:transparent;color:var(--slate);border:1px solid var(--navy-line);}

  .lesson-list{margin-top:10px;padding-left:2px;}
  .lesson-item{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;
    color:var(--slate);font-family:inherit;font-size:12.5px;padding:8px 4px 8px 10px;text-align:left;border-left:2px solid transparent;}
  .lesson-item:hover{color:var(--paper);}
  .lesson-item.active{color:var(--gold);border-left-color:var(--gold);}
  .lesson-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--navy-line);flex:none;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;}
  .lesson-item.done .lesson-dot{border-color:var(--gold);background:var(--gold);color:var(--navy-900);}
  .lesson-item.active .lesson-dot{border-color:var(--gold);}

  main{padding:40px 44px 90px;}
  @media (max-width:640px){main{padding:28px 18px 70px;}}

  .doc{background:var(--paper);color:var(--ink);border-radius:6px;max-width:840px;margin:0 auto;padding:44px 48px 56px;border:1px solid var(--paper-line);}
  @media (max-width:640px){.doc{padding:28px 22px 40px;}}
  .doc .eyebrow{color:var(--gold-dim);}
  .doc h2.display{font-size:clamp(28px,4vw,40px);color:var(--navy);margin:8px 0 22px;line-height:1.08;}
  .doc-meta{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 26px;padding-bottom:22px;border-bottom:1px solid var(--paper-line);}
  .doc-meta div{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);}
  .doc-meta strong{display:block;color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;margin-top:2px;}
  .doc p{font-size:16px;line-height:1.75;margin:0 0 18px;color:var(--ink);}
  .doc p strong{color:var(--navy);}

  .update-box{background:var(--update-soft);border-left:3px solid var(--update);border-radius:0 4px 4px 0;padding:14px 18px;margin:0 0 18px;}
  .update-box p{margin:0;font-size:14.5px;color:#1C3A57;line-height:1.6;}

  .section-label{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--navy);margin:40px 0 14px;padding-top:22px;border-top:1px solid var(--paper-line);display:flex;align-items:center;gap:10px;}
  .section-label::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none;}

  ul.doc-list{margin:0 0 6px;padding-left:0;list-style:none;}
  ul.doc-list li{position:relative;padding:6px 0 6px 22px;font-size:15px;line-height:1.6;color:var(--ink);}
  ul.doc-list li::before{content:"—";position:absolute;left:0;color:var(--gold-dim);}

  .concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px;}
  @media (max-width:640px){.concept-grid{grid-template-columns:1fr;}}
  .concept-card{background:#fff;border:1px solid var(--paper-line);border-radius:4px;padding:14px 16px;}
  .concept-card .term{font-weight:600;color:var(--navy);font-size:14px;margin:0 0 4px;}
  .concept-card .def{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.5;}

  .warn-box{background:var(--rust-soft);border-left:3px solid var(--rust);border-radius:0 4px 4px 0;padding:12px 16px;margin-bottom:10px;}
  .warn-box p{margin:0;font-size:14.5px;color:#5A231C;line-height:1.55;}
  .warn-box p strong{color:#5A231C;}

  .task-box{background:#fff;border:1px dashed var(--gold-dim);border-radius:4px;padding:20px 22px;}
  .task-box p{margin:0;font-size:15px;}

  .case-box{background:var(--navy);color:var(--paper);border-radius:4px;padding:24px 26px;}
  .case-box p{color:var(--paper);font-size:15px;line-height:1.7;margin:0;}
  .case-box .eyebrow{color:var(--gold);margin-bottom:8px;display:block;}

  .quiz-item{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--paper-line);}
  .quiz-item:last-child{border-bottom:none;}
  .quiz-q{font-size:15px;font-weight:500;color:var(--navy);margin:0 0 10px;}
  .quiz-q span{font-family:'IBM Plex Mono',monospace;color:var(--gold-dim);margin-right:8px;}
  .quiz-opt{display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border:1px solid var(--paper-line);border-radius:4px;margin-bottom:8px;cursor:pointer;background:#fff;font-size:14px;line-height:1.4;}
  .quiz-opt:hover{border-color:var(--gold-dim);}
  .quiz-opt input{margin-top:2px;accent-color:var(--gold-dim);flex:none;}
  .quiz-opt.correct{background:var(--ok-soft);border-color:var(--ok);}
  .quiz-opt.wrong{background:var(--rust-soft);border-color:var(--rust);}
  .quiz-actions{display:flex;align-items:center;gap:16px;margin-top:24px;}
  .btn-check{font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;font-size:12.5px;background:var(--navy);color:var(--gold);border:none;padding:12px 26px;border-radius:3px;cursor:pointer;}
  .btn-check:hover{background:var(--navy-700);}
  #quiz-score{font-size:14px;color:var(--ink-soft);}
  #quiz-score strong{color:var(--navy);}

  .glossary-item{padding:10px 0;border-bottom:1px solid var(--paper-line);}
  .glossary-item:last-child{border-bottom:none;}
  .glossary-item .g-term{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.03em;}
  .glossary-item .g-def{font-size:14.5px;margin:3px 0 0;color:var(--ink);}

  .interview-item{margin-bottom:16px;}
  .interview-q{font-size:15px;font-weight:500;color:var(--navy);margin:0 0 6px;}
  .interview-a{font-size:14.5px;color:var(--ink-soft);margin:0;line-height:1.6;padding-left:14px;border-left:2px solid var(--gold-soft);}

  .locked-doc{max-width:840px;margin:0 auto;}
  .locked-doc .eyebrow{color:var(--gold);}
  .locked-doc h2{font-family:'Big Shoulders Display',sans-serif;font-weight:800;text-transform:uppercase;color:var(--paper);font-size:clamp(26px,4vw,36px);margin:10px 0 16px;}
  .locked-doc>p{color:var(--slate);font-size:15px;line-height:1.7;max-width:620px;margin:0 0 30px;}
  .topics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
  .topic-chip{border:1px solid var(--navy-line);border-radius:4px;padding:12px 14px;font-size:13.5px;color:var(--paper);background:var(--navy-800);}
  .lock-note{margin-top:34px;display:flex;align-items:center;gap:10px;color:var(--gold);font-size:13px;font-family:'IBM Plex Mono',monospace;}

  footer.console-foot{text-align:center;padding:26px;color:var(--slate);font-size:12px;border-top:1px solid var(--navy-line);font-family:'IBM Plex Mono',monospace;}
  footer.console-foot span{color:var(--gold);}
</style>
</head>
<body>

<header class="console">
  <div class="brandmark">
    <div class="mark"></div>
    <div>
      <h1>GRIS<span>.EXPERT</span></h1>
      <p>Torre de Controle e Indicadores de Risco</p>
    </div>
  </div>
  <div class="radar-wrap">
    <a class="back-link" href="../cursos.html">← Voltar ao catálogo</a>
    <div class="radar">
      <svg viewBox="0 0 64 64">
        <circle class="ring-bg" cx="32" cy="32" r="27"></circle>
        <circle id="ring-fg" class="ring-fg" cx="32" cy="32" r="27" stroke-dasharray="169.6" stroke-dashoffset="169.6"></circle>
      </svg>
      <div class="rlabel" id="ring-label">0/5</div>
    </div>
    <div class="radar-text">
      <p class="t1">Progresso — Módulo 01</p>
      <p class="t2" id="progress-text">Nenhuma aula concluída</p>

</header>

<div class="shell">
  <aside class="manifest" id="manifest"></aside>
  <main id="main"></main>
</div>

<footer class="console-foot">GRIS.EXPERT — <span>Torre de Controle e Indicadores de Risco</span> — KRIs, KPIs e dashboards executivos para monitoramento de risco em tempo real</footer>

<script>
const MODULES = [
  {n:1, title:"Fundamentos da Torre de Controle", live:true,
   topics:["O que é uma Torre de Controle","KPI x KRI","Por que e-commerce de alta escala exige Torre de Controle","Os quatro pilares da Torre de Controle","🔄 De painel estático a monitoramento preditivo"]},
  {n:2, title:"Construindo KRIs e KPIs que Fazem Sentido", live:false,
   topics:["Como escolher um bom indicador","KPIs operacionais essenciais","KRIs de risco essenciais","Definindo limites de alerta","Erros comuns na definição de indicadores"]},
  {n:3, title:"Fontes de Dados e Integração", live:false,
   topics:["Mapeando fontes de dados: TMS, WMS, rastreadores, telemetria, CFTV","Integração de dados dispersos","Qualidade de dado","Integração via API e coleta em tempo real","Governança de dados"]},
  {n:4, title:"Construindo Dashboards Executivos", live:false,
   topics:["Dashboard operacional x executivo","Princípios de design de um bom dashboard","Painéis no Power BI aplicados a GRIS","Storytelling com dados","Erros comuns em dashboards executivos"]},
  {n:5, title:"Monitoramento em Tempo Real e Alertas", live:false,
   topics:["Fluxo de alerta: do dado bruto à ação","Responsáveis e SLA de resposta","Evitando fadiga de alerta","Automação de primeira resposta com IA","Integração com protocolos de contingência"]},
  {n:6, title:"Governança, Cadência de Reporte e Cultura de Indicador", live:false,
   topics:["Cadência de reporte","Comitês de indicadores","Cultura de indicador na operação","Auditoria e revisão periódica","Indicadores de risco e resultado financeiro"]},
  {n:7, title:"Estudos de Caso e Simulações", live:false,
   topics:["Torre de Controle que reduziu tempo de resposta","Dashboard mal desenhado que escondeu um risco","Simulação: definindo 5 KRIs","Simulação: desenhando um dashboard","Simulação: apresentação para a diretoria"]},
  {n:8, title:"Carreira e Projeto Final", live:false,
   topics:["Como falar sobre Torre de Controle em entrevistas","Perguntas frequentes sobre KPIs e KRIs","Portfólio: dado em decisão executiva","Erro de carreira: focar só na ferramenta","Projeto Final: Torre de Controle completa"]},
];

const LESSONS = [
{
  id:1, title:"O que é uma Torre de Controle e por que ela vai além do monitoramento tradicional", duration:"11 min", level:"Introdutório",
  content:[
    "Quando alguém fala em \"Torre de Controle\" dentro de uma operação logística, é comum imaginar uma versão mais bonita da central de monitoramento — mais telas, mais gráficos, mesma função. Essa visão está incompleta. A diferença central não está na quantidade de telas, e sim no <strong>objetivo</strong>: enquanto uma central de monitoramento tradicional acompanha viagens e trata ocorrências, uma Torre de Controle acompanha o <strong>desempenho da operação inteira</strong> — prazo, custo, qualidade e risco — de forma integrada.",
    "Pense assim: a central de monitoramento pergunta \"essa viagem específica está segura agora?\". A Torre de Controle pergunta \"como está a saúde da operação como um todo, hoje, essa semana, este mês — e o que isso significa para o resultado do negócio?\". São perguntas diferentes, que exigem estruturas diferentes, mesmo que compartilhem parte da mesma tecnologia de base.",
    "Uma Torre de Controle bem estruturada reúne, em um único ambiente de decisão, indicadores operacionais (como SLA de entrega e índice de avarias) e indicadores de risco (como sinistralidade e exposição por rota), permitindo que a liderança enxergue não só \"o que está acontecendo\", mas \"o que está acontecendo e por quê, e o que fazer a respeito\".",
    "É por isso que a Torre de Controle não é uma função exclusiva de TI, nem uma função exclusiva de GRIS — ela nasce, geralmente, da colaboração entre as duas áreas. TI garante que os dados estejam disponíveis, integrados e confiáveis; GRIS garante que os indicadores certos estejam sendo olhados e que eles gerem ação, não só um relatório bonito no fim do mês.",
    "Um erro comum é achar que basta comprar uma ferramenta de BI e conectar algumas fontes de dados para ter uma Torre de Controle funcionando. A tecnologia é só uma parte — sem indicadores bem definidos, sem responsáveis claros por cada alerta e sem uma cadência de decisão estruturada, o resultado é só um painel bonito que ninguém usa para decidir nada.",
    "Ao longo deste curso, você vai aprender a construir, do zero, os quatro elementos que sustentam uma Torre de Controle de verdade: indicadores relevantes, dados confiáveis, dashboards que comunicam com clareza e um fluxo de decisão que transforma dado em ação."
  ],
  resumo:[
    "Torre de Controle acompanha a saúde da operação inteira (prazo, custo, qualidade, risco), não só viagens individuais.",
    "Central de monitoramento e Torre de Controle compartilham tecnologia, mas respondem perguntas diferentes.",
    "Uma Torre de Controle madura integra indicadores operacionais e de risco no mesmo ambiente de decisão.",
    "Nasce da colaboração entre TI (dados confiáveis) e GRIS (indicadores certos e geração de ação).",
    "Tecnologia de BI sozinha não faz uma Torre de Controle funcionar — falta indicador, responsável e cadência de decisão."
  ],
  conceitos:[
    {term:"Torre de Controle", def:"Estrutura que monitora o desempenho integrado de uma operação (prazo, custo, qualidade, risco) para sustentar decisão."},
    {term:"Ambiente de decisão", def:"Espaço (físico ou digital) onde indicadores são analisados e transformados em ação concreta."},
    {term:"Indicador operacional", def:"Métrica que mede a execução do processo em si (ex: SLA, tempo de trânsito)."},
    {term:"Indicador de risco", def:"Métrica que sinaliza exposição a eventos que podem gerar perda (ex: sinistralidade)."}
  ],
  erros:[
    "Achar que Torre de Controle é sinônimo de central de monitoramento com mais telas.",
    "Tratar a Torre de Controle como projeto exclusivo de TI, sem envolvimento de GRIS na definição de indicadores.",
    "Comprar ferramenta de BI antes de definir quais indicadores realmente importam para a operação.",
    "Construir um painel sem responsável definido para agir sobre o que ele mostra."
  ],
  exercicio:"Escreva duas perguntas que uma central de monitoramento tradicional responderia sobre uma operação, e duas perguntas que só uma Torre de Controle integrada conseguiria responder. Use exemplos da sua própria experiência, se possível.",
  quiz:[
    {q:"Qual é a principal diferença entre uma central de monitoramento tradicional e uma Torre de Controle?", opts:["Não existe diferença real, são sinônimos","A Torre de Controle acompanha o desempenho integrado da operação, não só viagens individuais","A central de monitoramento sempre tem mais tecnologia","A Torre de Controle não usa nenhum dado de rastreamento"], correct:1},
    {q:"Uma Torre de Controle bem estruturada integra, no mesmo ambiente de decisão:", opts:["Apenas indicadores financeiros","Indicadores operacionais e indicadores de risco","Apenas dados de rastreamento em tempo real","Somente relatórios anuais de auditoria"], correct:1},
    {q:"Por que a Torre de Controle geralmente nasce da colaboração entre TI e GRIS?", opts:["Porque TI garante dados confiáveis e GRIS garante indicadores certos e geração de ação","Porque são a mesma área na maioria das empresas","Porque TI define sozinha quais indicadores são relevantes","Porque GRIS não tem nenhuma relação com dados"], correct:0},
    {q:"Qual é o erro mais comum ao tentar implantar uma Torre de Controle?", opts:["Definir indicadores antes de comprar qualquer ferramenta","Achar que basta comprar uma ferramenta de BI e conectar dados para funcionar sozinha","Envolver GRIS na definição dos indicadores","Ter responsáveis definidos para cada alerta"], correct:1},
    {q:"Um painel de indicadores sem responsável definido para agir sobre ele tende a se tornar:", opts:["Uma ferramenta estratégica indispensável","Um painel bonito que ninguém usa para decidir nada","O modelo ideal de Torre de Controle","Automaticamente mais preciso que um painel com responsável"], correct:1},
    {q:"Qual pergunta está mais alinhada ao propósito de uma Torre de Controle (em vez de uma central de monitoramento tradicional)?", opts:["\"Essa viagem específica está segura agora?\"","\"Como está a saúde da operação como um todo esta semana, e o que isso significa para o resultado do negócio?\"","\"Qual a placa do veículo nesta rota?\"","\"O motorista já chegou ao ponto de parada?\""], correct:1},
    {q:"Os quatro elementos que sustentam uma Torre de Controle, segundo esta aula, são:", opts:["Apenas tecnologia e orçamento","Indicadores relevantes, dados confiáveis, dashboards claros e fluxo de decisão que gera ação","Apenas CFTV e rastreamento via satélite","Somente relatórios financeiros mensais"], correct:1},
    {q:"Indicador operacional, como definido nesta aula, mede principalmente:", opts:["A exposição a eventos que podem gerar perda","A execução do processo em si, como SLA e tempo de trânsito","Exclusivamente o resultado financeiro da empresa","O comportamento de compra do cliente final"], correct:1},
    {q:"Indicador de risco (KRI), como definido nesta aula, mede principalmente:", opts:["A exposição a eventos que podem gerar perda, como sinistralidade","Apenas o tempo de entrega médio","O número de funcionários da operação","A quantidade de veículos da frota"], correct:0},
    {q:"Por que a tecnologia de BI, sozinha, não garante uma Torre de Controle funcional?", opts:["Porque ferramentas de BI nunca funcionam em operações logísticas","Porque falta indicador bem definido, responsável e cadência de decisão para transformar dado em ação","Porque BI é incompatível com dados de rastreamento","Porque toda ferramenta de BI já vem com indicadores prontos de GRIS"], correct:1}

{
  id:2, title:"Diferença entre indicador operacional e indicador de risco (KPI x KRI)", duration:"12 min", level:"Introdutório",
  content:[
    "KPI e KRI são duas siglas que, na prática do dia a dia, acabam sendo usadas de forma intercambiável — e isso é um problema, porque elas medem coisas diferentes e servem a propósitos diferentes dentro de uma Torre de Controle.",
    "<strong>KPI (Key Performance Indicator)</strong> é um indicador-chave de desempenho: ele mede o quão bem um processo está sendo executado em relação a uma meta. SLA de entrega, tempo médio de trânsito, índice de avarias, custo por quilômetro rodado — todos são exemplos de KPI. A pergunta que um KPI responde é: <strong>\"estamos entregando o que prometemos, dentro do padrão esperado?\"</strong>",
    "<strong>KRI (Key Risk Indicator)</strong> é um indicador-chave de risco: ele não mede desempenho, mede <strong>exposição a um evento futuro indesejado</strong>. Sinistralidade por rota, tempo médio de resposta a uma ocorrência, percentual de viagens sem cobertura de rastreamento em tempo real — são exemplos de KRI. A pergunta que um KRI responde é: <strong>\"o quão perto estamos de um problema que ainda não aconteceu?\"</strong>",
    "A confusão entre os dois é perigosa porque um KPI bom pode esconder um KRI ruim. Uma operação pode ter SLA de entrega excelente (KPI ótimo) e, ao mesmo tempo, estar operando em rotas de altíssimo risco sem nenhum controle adicional (KRI péssimo) — o desempenho está bom porque o risco ainda não se materializou, não porque ele não existe.",
    "Uma Torre de Controle bem construída acompanha os dois tipos de indicador lado a lado, exatamente para evitar esse ponto cego. Olhar só para KPI é like dirigir olhando apenas o velocímetro, sem olhar o nível de combustível ou a luz de alerta do motor — tudo parece bem até o momento em que para de parecer.",
    "Uma forma prática de diferenciar os dois na hora de definir um novo indicador: se ele mede o que já aconteceu e quão bem foi executado, é KPI. Se ele mede a chance ou proximidade de algo ruim acontecer no futuro, é KRI. Os dois são necessários — e, como veremos no Módulo 2, os melhores dashboards de Torre de Controle sempre colocam KPI e KRI lado a lado, nunca em telas separadas."
  ],
  resumo:[
    "KPI mede desempenho de execução em relação a uma meta (\"estamos entregando bem?\").",

    "Um KPI bom pode esconder um KRI ruim — desempenho aparente não significa ausência de risco.",
    "Olhar só KPI é um ponto cego clássico de operações que só amadurecem depois de um sinistro grande.",

  conceitos:[

    {q:"O que um KRI mede, segundo esta aula?", opts:["O desempenho de execução de um processo","A exposição a um evento de risco que ainda não se materializou","Apenas a satisfação do cliente","O número de funcionários da operação"], correct:1},

    {q:"Uma operação com SLA de entrega excelente, mas operando em rotas de altíssimo risco sem controle adicional, é um exemplo de:", opts:["KRI bom mascarando KPI ruim","KPI bom mascarando KRI ruim","Ausência total de qualquer indicador","Situação impossível de ocorrer na prática"], correct:1},
    {q:"A analogia usada na aula para \"olhar só KPI\" compara essa prática a:", opts:["Dirigir olhando apenas o velocímetro, sem ver o nível de combustível ou luzes de alerta","Dirigir sem nenhum instrumento no painel","Usar apenas o GPS para tomar decisões","Não dirigir de forma alguma"], correct:0},
    {q:"Como diferenciar rapidamente se um novo indicador é KPI ou KRI?", opts:["Todo indicador numérico é automaticamente um KPI","Se mede o que já aconteceu e quão bem foi executado, é KPI; se mede chance de algo ruim no futuro, é KRI","Não existe forma prática de diferenciar os dois","KRI só existe em empresas do setor financeiro"], correct:1},

    {q:"Um KRI genérico demais, sem capacidade de antecipar algo específico da operação, é considerado:", opts:["O modelo ideal de indicador de risco","Um erro comum na definição de indicadores, tratado nesta aula","Mais eficaz que um KRI específico","Irrelevante para a discussão desta aula"], correct:1}

{
  id:3, title:"Por que operações de e-commerce de alta escala exigem Torre de Controle estruturada", duration:"11 min", level:"Intermediário",
  content:[
    "Operações de e-commerce de alta escala — como as que atendem marketplaces como Shopee e Mercado Livre — têm uma característica que muda completamente a exigência sobre GRIS: <strong>volume</strong>. Não é a mesma coisa gerenciar risco em uma operação de algumas centenas de entregas por dia e em uma operação de dezenas ou centenas de milhares.",
    "Em baixo volume, um gestor experiente consegue, na prática, \"sentir\" a operação: conhece as rotas críticas, lembra dos motoristas de maior risco, percebe padrões pela experiência acumulada. Em alta escala, essa abordagem artesanal simplesmente não escala — é fisicamente impossível para uma pessoa (ou mesmo uma equipe pequena) acompanhar manualmente milhares de entregas simultâneas com o mesmo nível de atenção.",
    "É exatamente nesse ponto que a Torre de Controle deixa de ser um diferencial e passa a ser uma necessidade estrutural. Sem indicadores agregados, painéis por região e sistema de priorização automática, a operação de alta escala fica refém de dois cenários ruins: ou trata tudo com o mesmo nível de atenção (impossível de sustentar) ou trata tudo de forma genérica (perdendo sinais de risco específicos que importam).",
    "Além do volume, marketplaces de grande porte impõem exigências contratuais específicas — SLA rígido, penalidades por atraso, auditorias periódicas de segurança e, cada vez mais, exigência explícita de estrutura de gestão de risco auditável. Uma transportadora que não consegue demonstrar, com dados, como monitora e trata risco em escala corre o risco real de perder contrato — não por falha operacional pontual, mas por falta de maturidade estrutural visível.",
    "Há ainda um fator de velocidade: em operações de alta escala, o tempo entre um sinal de risco aparecer e um problema real acontecer costuma ser muito mais curto, porque o volume de viagens simultâneas aumenta a chance de qualquer padrão de risco se manifestar rapidamente em algum ponto da operação. Uma Torre de Controle bem estruturada reduz esse tempo de reação justamente onde ele mais importa: nos primeiros minutos depois que um indicador cruza o limite de alerta.",
    "Em resumo: alta escala não é só \"mais do mesmo\" — é uma mudança de natureza do problema, que exige uma mudança correspondente na forma de gerenciar risco. É por isso que praticamente toda operação de e-commerce de grande porte no Brasil hoje trabalha, em algum grau, com o conceito de Torre de Controle."

{
  id:4, title:"Os quatro pilares de uma Torre de Controle: dados, pessoas, tecnologia e governança", duration:"12 min", level:"Intermediário",
  content:[
    "Depois de entender o que é uma Torre de Controle e por que ela se torna indispensável em alta escala, esta aula detalha os quatro pilares que sustentam qualquer Torre de Controle funcional — na ordem em que, normalmente, precisam ser construídos.",
    "O primeiro pilar é <strong>dados</strong>. Sem dado confiável, atualizado e íntegro, nenhum indicador tem valor real — na verdade, um indicador construído sobre dado ruim é pior do que nenhum indicador, porque gera falsa confiança na decisão. Antes de pensar em dashboard, é preciso garantir que as fontes de dado (TMS, WMS, rastreamento, telemetria) estejam realmente alimentando a Torre de Controle de forma consistente.",
    "O segundo pilar são <strong>pessoas</strong>. Uma Torre de Controle não funciona sozinha — precisa de responsáveis claros para cada indicador, gente capaz de interpretar o que os números estão dizendo (não só olhar para eles) e uma cultura organizacional que valorize decisão baseada em dado, não em intuição isolada. É comum empresas investirem pesado em tecnologia e pouco em capacitação da equipe que vai, de fato, usar os indicadores no dia a dia.",
    "O terceiro pilar é <strong>tecnologia</strong> — e aqui entram as ferramentas de integração de dados, plataformas de BI (como Power BI), sistemas de alerta automatizado e a infraestrutura que sustenta tudo isso funcionando em tempo real. É o pilar mais visível, mas, sozinho, é o menos eficaz dos quatro sem os outros três já estruturados.",
    "O quarto pilar é <strong>governança</strong>: as regras que definem quem decide o quê, com que frequência os indicadores são revisados, como um novo indicador é proposto e validado, e como a Torre de Controle se conecta formalmente com outras áreas (GRIS, operação, comercial, diretoria). Sem governança, mesmo uma Torre de Controle tecnicamente bem construída tende a virar, com o tempo, um painel que ninguém mais atualiza ou revisa.",
    "Esses quatro pilares não são etapas isoladas e sequenciais — eles se sustentam mutuamente. Dado ruim quebra a confiança das pessoas na ferramenta; falta de governança faz a tecnologia virar um projeto abandonado; ausência de pessoas capacitadas transforma bom dado em decisão ruim. Uma Torre de Controle de excelência é aquela que mantém os quatro pilares evoluindo em conjunto, não um de cada vez isoladamente."
  ],
  resumo:[
    "Pilar 1 — Dados: sem dado confiável, indicador vira falsa confiança, não decisão melhor.",
    "Pilar 2 — Pessoas: responsáveis claros, capacidade de interpretação e cultura de decisão orientada a dado.",
    "Pilar 3 — Tecnologia: ferramentas de integração, BI e alerta — o pilar mais visível, mas o menos eficaz isoladamente.",
    "Pilar 4 — Governança: regras de decisão, cadência de revisão e conexão formal entre áreas.",
    "Os quatro pilares se sustentam mutuamente — nenhum deles funciona plenamente sozinho."
  ],
  conceitos:[
    {term:"Dado íntegro", def:"Informação completa, consistente e sem corrupção, adequada para sustentar decisão confiável."},
    {term:"Cultura orientada a dado", def:"Ambiente organizacional em que decisões são baseadas prioritariamente em evidência numérica, não apenas intuição."},
    {term:"Governança de indicadores", def:"Conjunto de regras que define responsabilidade, cadência e processo de revisão dos indicadores de uma organização."},
    {term:"Falsa confiança de indicador", def:"Sensação de segurança gerada por um indicador construído sobre dado de baixa qualidade."}
  ],
  erros:[

    "Achar que um bom dashboard resolve, sozinho, a falta de cultura orientada a dado na equipe.",
    "Não definir regras claras de governança, deixando o painel sem dono real ao longo do tempo.",

let state = { activeModule:1, activeLesson:1, done:{}, quizChecked:false };

function renderManifest(){
  const el = document.getElementById('manifest');
  let html = `<div class="manifest-head">
      <span class="eyebrow">Manifesto do curso</span>
      <p>8 módulos, dos fundamentos da Torre de Controle ao projeto final. Módulo 01 disponível na íntegra.</p>
    </div>`;
  MODULES.forEach(m=>{
    const active = m.n === state.activeModule ? 'active' : '';
    html += `<button class="mod-row ${active}" onclick="selectModule(${m.n})">
      <div class="row-top">
        <span class="mod-num">Módulo ${String(m.n).padStart(2,'0')}</span>
        <span class="pill ${m.live?'live':'soon'}">${m.live?'Disponível':'Em breve'}</span>
      </div>
      <p class="mod-title">${m.title}</p>
    </button>`;
    if(m.n === state.activeModule && m.live){
      html += `<div class="lesson-list">`;
      LESSONS.forEach(l=>{
        const lact = l.id === state.activeLesson ? 'active':'';
        const ldone = state.done[l.id] ? 'done':'';
        html += `<button class="lesson-item ${lact} ${ldone}" onclick="selectLesson(${l.id})">
          <span class="lesson-dot">${state.done[l.id]?'<i>✓</i>':''}</span>
          <span>Aula ${l.id} — ${l.title}</span>
        </button>`;
      });
      html += `</div>`;
    }
  });
  el.innerHTML = html;
}

function renderLocked(mod){
  const chips = mod.topics.map(t=>`<div class="topic-chip">${t}</div>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="locked-doc">
      <span class="eyebrow">Módulo ${String(mod.n).padStart(2,'0')} · Estrutura do curso</span>
      <h2>${mod.title}</h2>
      <p>Este módulo faz parte da estrutura completa do curso e segue o mesmo padrão do Módulo 01: aulas em microformato, resumo, conceitos-chave, erros comuns, exercício prático, quiz de 10 perguntas, estudo de caso e preparação para entrevista.</p>
      <div class="topics-grid">${chips}</div>
      <div class="lock-note"><span>&#9679;</span> Conteúdo completo liberado nas próximas entregas do curso</div>
    </div>`;
}

function renderLesson(l){
  const conceptCards = l.conceitos.map(c=>`<div class="concept-card"><p class="term">${c.term}</p><p class="def">${c.def}</p></div>`).join('');
  const erroBoxes = l.erros.map(e=>`<div class="warn-box"><p><strong>Erro comum —</strong> ${e}</p></div>`).join('');
  const glossary = l.glossario.map(g=>`<div class="glossary-item"><p class="g-term">${g.term}</p><p class="g-def">${g.def}</p></div>`).join('');
  const interview = l.entrevista.map(q=>`<div class="interview-item"><p class="interview-q">${q.q}</p><p class="interview-a">${q.tip}</p></div>`).join('');
  const quizItems = l.quiz.map((q,qi)=>{
    const opts = q.opts.map((o,oi)=>`<label class="quiz-opt" data-qi="${qi}" data-oi="${oi}">
        <input type="radio" name="q${qi}" value="${oi}"><span>${o}</span>
      </label>`).join('');
    return `<div class="quiz-item">
        <p class="quiz-q"><span>${String(qi+1).padStart(2,'0')}</span>${q.q}</p>
        ${opts}
      </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="doc">
      <span class="eyebrow">Aula ${String(l.id).padStart(2,'0')} · Módulo 01 — Fundamentos da Torre de Controle</span>
      <h2 class="display">${l.title}</h2>
      <div class="doc-meta">
        <div>Duração<strong>${l.duration}</strong></div>
        <div>Nível<strong>${l.level}</strong></div>
        <div>Formato<strong>Microaula + prática</strong></div>
      </div>
      ${l.content.map(p=>`<p>${p}</p>`).join('')}

      <p class="section-label">Resumo</p>
      <ul class="doc-list">${l.resumo.map(r=>`<li>${r}</li>`).join('')}</ul>

      <p class="section-label">Conceitos-chave</p>
      <div class="concept-grid">${conceptCards}</div>

      <p class="section-label">Erros mais comuns</p>
      ${erroBoxes}

      <p class="section-label">Exercício prático</p>
      <div class="task-box"><p>${l.exercicio}</p></div>

      <p class="section-label">Quiz — 10 perguntas</p>
      <div id="quiz-body">${quizItems}</div>
      <div class="quiz-actions">
        <button class="btn-check" onclick="checkQuiz()">Corrigir quiz</button>
        <span id="quiz-score"></span>
      </div>

      <p class="section-label">Estudo de caso</p>
      <div class="case-box"><span class="eyebrow">Cenário real de operação</span><p>${l.caso}</p></div>

      <p class="section-label">Glossário</p>
      ${glossary}

      <p class="section-label">Perguntas de entrevista</p>
      ${interview}
    </div>`;

  state.done[l.id] = true;
  updateRadar();
  renderManifest();
}

function checkQuiz(){
  const lesson = LESSONS.find(l=>l.id===state.activeLesson);
  let correctCount = 0;
  lesson.quiz.forEach((q,qi)=>{
    const selected = document.querySelector(`input[name="q${qi}"]:checked`);
    const opts = document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`);
    opts.forEach(o=>{
      const oi = parseInt(o.getAttribute('data-oi'));
      o.classList.remove('correct','wrong');
      if(oi === q.correct){ o.classList.add('correct'); }
      else if(selected && parseInt(selected.value) === oi){ o.classList.add('wrong'); }
    });
    if(selected && parseInt(selected.value) === q.correct) correctCount++;
  });
  document.getElementById('quiz-score').innerHTML = `Resultado: <strong>${correctCount}/10</strong> respostas corretas`;
}

function updateRadar(){
  const total = LESSONS.length;
  const doneCount = Object.keys(state.done).length;
  const circumference = 169.6;
  const offset = circumference - (circumference * (doneCount/total));
  document.getElementById('ring-fg').style.strokeDashoffset = offset;
  document.getElementById('ring-label').textContent = doneCount + '/' + total;
  document.getElementById('progress-text').textContent = doneCount === 0
    ? 'Nenhuma aula concluída'
    : (doneCount === total ? 'Módulo 01 concluído' : doneCount + ' de ' + total + ' aulas vistas');
}

function selectModule(n){
  state.activeModule = n;
  const mod = MODULES.find(m=>m.n===n);
  if(mod.live){
    if(!LESSONS.find(l=>l.id===state.activeLesson)) state.activeLesson = 1;
    renderManifest();
    renderLesson(LESSONS.find(l=>l.id===state.activeLesson));
  } else {
    renderManifest();
    renderLocked(mod);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectLesson(id){
  state.activeLesson = id;
  renderManifest();
  renderLesson(LESSONS.find(l=>l.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

renderManifest();
renderLesson(LESSONS[0]);
</script>
