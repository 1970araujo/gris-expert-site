<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Gestão de Riscos Corporativos — GRIS.EXPERT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#0D2B45;
    --navy-800:#0A2138;
    --navy-900:#071726;
    --navy-700:#16385A;
    --navy-line:#26496B;
    --gold:#C9A84C;
    --gold-dim:#8C6F2E;
    --gold-soft:#E4D3A0;
    --paper:#F3EFE6;
    --paper-line:#DED5B8;
    --ink:#20211C;
    --ink-soft:#585648;
    --rust:#A63D2F;
    --rust-soft:#F1DCD6;
    --ok:#3F6B4B;
    --ok-soft:#DCE8DD;
    --slate:#8FA4B8;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy-900);
    color:var(--paper);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{
    font-family:'IBM Plex Mono',monospace;
    letter-spacing:.14em;
    text-transform:uppercase;
    font-size:11px;
    color:var(--gold);
  }
  .display{
    font-family:'Big Shoulders Display',sans-serif;
    text-transform:uppercase;
    font-weight:800;
    letter-spacing:.01em;
  }

  /* ===== HEADER ===== */
  header.console{
    background:linear-gradient(180deg,var(--navy-800),var(--navy));
    border-bottom:1px solid var(--navy-line);
    padding:22px 32px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:24px;
    flex-wrap:wrap;
  }
  .brandmark{display:flex;align-items:center;gap:16px;}
  .brandmark .mark{
    width:46px;height:46px;border:1.5px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;position:relative;flex:none;
  }
  .brandmark .mark::before{
    content:"";position:absolute;width:26px;height:26px;border:1px solid var(--gold-dim);border-radius:50%;
  }
  .brandmark .mark::after{content:"";position:absolute;width:5px;height:5px;background:var(--gold);border-radius:50%;}
  .brandmark h1{
    font-family:'Big Shoulders Display',sans-serif;
    font-weight:800;font-size:22px;letter-spacing:.04em;margin:0;color:var(--paper);
    text-transform:uppercase;
  }
  .brandmark h1 span{color:var(--gold);}
  .brandmark p{margin:2px 0 0;font-size:12.5px;color:var(--slate);}

  .radar-wrap{display:flex;align-items:center;gap:14px;}
  .radar{position:relative;width:64px;height:64px;flex:none;}
  .radar svg{width:100%;height:100%;transform:rotate(-90deg);}
  .radar .ring-bg{fill:none;stroke:var(--navy-line);stroke-width:5;}
  .radar .ring-fg{fill:none;stroke:var(--gold);stroke-width:5;stroke-linecap:round;
    transition:stroke-dashoffset .6s ease;}
  .radar .rlabel{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold);
  }
  .radar-text .t1{font-size:12px;color:var(--slate);margin:0;}
  .radar-text .t2{font-size:14px;color:var(--paper);margin:0;font-weight:500;}

  /* ===== LAYOUT ===== */
  .shell{display:grid;grid-template-columns:300px 1fr;min-height:calc(100vh - 92px);}
  @media (max-width:860px){.shell{grid-template-columns:1fr;}}

  /* ===== SIDEBAR ===== */
  aside.manifest{
    background:var(--navy-800);
    border-right:1px solid var(--navy-line);
    padding:22px 0 40px;
  }
  .manifest-head{padding:0 22px 16px;border-bottom:1px solid var(--navy-line);margin-bottom:6px;}
  .manifest-head .eyebrow{display:block;margin-bottom:4px;}
  .manifest-head p{margin:0;font-size:13px;color:var(--slate);line-height:1.5;}

  .mod-row{
    display:block;width:100%;text-align:left;background:none;border:none;cursor:pointer;
    padding:14px 22px;color:var(--paper);border-bottom:1px solid var(--navy-line);
    font-family:inherit;
  }
  .mod-row:hover{background:var(--navy-700);}
  .mod-row.active{background:var(--navy-700);box-shadow:inset 3px 0 0 var(--gold);}
  .mod-row .row-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .mod-num{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);}
  .mod-title{font-size:14px;font-weight:500;margin:3px 0 0;line-height:1.3;}
  .pill{
    font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.06em;
    padding:3px 8px;border-radius:20px;text-transform:uppercase;flex:none;
  }
  .pill.live{background:rgba(201,168,76,.16);color:var(--gold);border:1px solid var(--gold-dim);}
  .pill.soon{background:transparent;color:var(--slate);border:1px solid var(--navy-line);}

  .lesson-list{margin-top:10px;padding-left:2px;}
  .lesson-item{
    display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;cursor:pointer;
    color:var(--slate);font-family:inherit;font-size:13px;padding:8px 4px 8px 10px;text-align:left;
    border-left:2px solid transparent;
  }
  .lesson-item:hover{color:var(--paper);}
  .lesson-item.active{color:var(--gold);border-left-color:var(--gold);}
  .lesson-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--navy-line);flex:none;
    display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;}
  .lesson-item.done .lesson-dot{border-color:var(--gold);background:var(--gold);color:var(--navy-900);}
  .lesson-item.active .lesson-dot{border-color:var(--gold);}

  /* ===== MAIN ===== */
  main{padding:40px 44px 90px;}
  @media (max-width:640px){main{padding:28px 18px 70px;}}

  .doc{
    background:var(--paper);
    color:var(--ink);
    border-radius:6px;
    max-width:840px;
    margin:0 auto;
    padding:44px 48px 56px;
    border:1px solid var(--paper-line);
  }
  @media (max-width:640px){.doc{padding:28px 22px 40px;}}

  .doc .eyebrow{color:var(--gold-dim);}
  .doc h2.display{
    font-size:clamp(30px,4vw,42px);color:var(--navy);margin:8px 0 22px;line-height:1.05;
  }
  .doc-meta{display:flex;gap:18px;flex-wrap:wrap;margin:0 0 26px;padding-bottom:22px;border-bottom:1px solid var(--paper-line);}
  .doc-meta div{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--ink-soft);}
  .doc-meta strong{display:block;color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:13.5px;font-weight:500;margin-top:2px;}

  .doc p{font-size:16px;line-height:1.75;margin:0 0 18px;color:var(--ink);}
  .doc p strong{color:var(--navy);}

  .section-label{
    font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--navy);margin:40px 0 14px;padding-top:22px;border-top:1px solid var(--paper-line);
    display:flex;align-items:center;gap:10px;
  }
  .section-label::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--gold);flex:none;}

  ul.doc-list{margin:0 0 6px;padding-left:0;list-style:none;}
  ul.doc-list li{
    position:relative;padding:6px 0 6px 22px;font-size:15px;line-height:1.6;color:var(--ink);
  }
  ul.doc-list li::before{content:"—";position:absolute;left:0;color:var(--gold-dim);}

  .concept-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:6px;}
  @media (max-width:640px){.concept-grid{grid-template-columns:1fr;}}
  .concept-card{background:#fff;border:1px solid var(--paper-line);border-radius:4px;padding:14px 16px;}
  .concept-card .term{font-weight:600;color:var(--navy);font-size:14px;margin:0 0 4px;}
  .concept-card .def{font-size:13.5px;color:var(--ink-soft);margin:0;line-height:1.5;}

  .warn-box{
    background:var(--rust-soft);border-left:3px solid var(--rust);border-radius:0 4px 4px 0;
    padding:12px 16px;margin-bottom:10px;
  }
  .warn-box p{margin:0;font-size:14.5px;color:#5A231C;line-height:1.55;}
  .warn-box p strong{color:#5A231C;}

  .task-box{
    background:#fff;border:1px dashed var(--gold-dim);border-radius:4px;padding:20px 22px;
  }
  .task-box p{margin:0;font-size:15px;}

  .case-box{background:var(--navy);color:var(--paper);border-radius:4px;padding:24px 26px;}
  .case-box p{color:var(--paper);font-size:15px;line-height:1.7;margin:0;}
  .case-box .eyebrow{color:var(--gold);margin-bottom:8px;display:block;}

  /* quiz */
  .quiz-item{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--paper-line);}
  .quiz-item:last-child{border-bottom:none;}
  .quiz-q{font-size:15px;font-weight:500;color:var(--navy);margin:0 0 10px;}
  .quiz-q span{font-family:'IBM Plex Mono',monospace;color:var(--gold-dim);margin-right:8px;}
  .quiz-opt{
    display:flex;align-items:flex-start;gap:10px;padding:9px 12px;border:1px solid var(--paper-line);
    border-radius:4px;margin-bottom:8px;cursor:pointer;background:#fff;font-size:14px;line-height:1.4;
  }
  .quiz-opt:hover{border-color:var(--gold-dim);}
  .quiz-opt input{margin-top:2px;accent-color:var(--gold-dim);flex:none;}
  .quiz-opt.correct{background:var(--ok-soft);border-color:var(--ok);}
  .quiz-opt.wrong{background:var(--rust-soft);border-color:var(--rust);}
  .quiz-actions{display:flex;align-items:center;gap:16px;margin-top:24px;}
  .btn-check{
    font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.06em;font-size:12.5px;
    background:var(--navy);color:var(--gold);border:none;padding:12px 26px;border-radius:3px;cursor:pointer;
  }
  .btn-check:hover{background:var(--navy-700);}
  #quiz-score{font-size:14px;color:var(--ink-soft);}
  #quiz-score strong{color:var(--navy);}

  .glossary-item{padding:10px 0;border-bottom:1px solid var(--paper-line);}
  .glossary-item:last-child{border-bottom:none;}
  .glossary-item .g-term{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold-dim);
    text-transform:uppercase;letter-spacing:.03em;}
  .glossary-item .g-def{font-size:14.5px;margin:3px 0 0;color:var(--ink);}

  .interview-item{margin-bottom:16px;}
  .interview-q{font-size:15px;font-weight:500;color:var(--navy);margin:0 0 6px;}
  .interview-a{font-size:14.5px;color:var(--ink-soft);margin:0;line-height:1.6;padding-left:14px;
    border-left:2px solid var(--gold-soft);}

  /* locked module view */
  .locked-doc{max-width:840px;margin:0 auto;}
  .locked-doc .eyebrow{color:var(--gold);}
  .locked-doc h2{font-family:'Big Shoulders Display',sans-serif;font-weight:800;text-transform:uppercase;
    color:var(--paper);font-size:clamp(28px,4vw,38px);margin:10px 0 16px;}
  .locked-doc>p{color:var(--slate);font-size:15px;line-height:1.7;max-width:620px;margin:0 0 30px;}
  .topics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;}
  .topic-chip{
    border:1px solid var(--navy-line);border-radius:4px;padding:12px 14px;font-size:13.5px;color:var(--paper);
    background:var(--navy-800);
  }
  .lock-note{margin-top:34px;display:flex;align-items:center;gap:10px;color:var(--gold);font-size:13px;
    font-family:'IBM Plex Mono',monospace;}

  footer.console-foot{
    text-align:center;padding:26px;color:var(--slate);font-size:12px;border-top:1px solid var(--navy-line);
    font-family:'IBM Plex Mono',monospace;
  }
  footer.console-foot span{color:var(--gold);}
</style>
</head>
<body>

<header class="console">
  <div class="brandmark">
    <div class="mark"></div>
    <div>
      <h1>GRIS<span>.EXPERT</span></h1>
      <p>Central de Gestão de Riscos Corporativos — Curso Executivo ISO 31000 / COSO ERM</p>
    </div>
  </div>
  <div class="radar-wrap">
    <div class="radar">
      <svg viewBox="0 0 64 64">
        <circle class="ring-bg" cx="32" cy="32" r="27"></circle>
        <circle id="ring-fg" class="ring-fg" cx="32" cy="32" r="27" stroke-dasharray="169.6" stroke-dashoffset="169.6"></circle>
      </svg>
      <div class="rlabel" id="ring-label">0/5</div>
    </div>
    <div class="radar-text">
      <p class="t1">Progresso — Módulo 01</p>
      <p class="t2" id="progress-text">Nenhuma aula concluída</p>
    </div>
  </div>
</header>

<div class="shell">
  <aside class="manifest" id="manifest"></aside>
  <main id="main"></main>
</div>

<footer class="console-foot">GRIS.EXPERT — <span>Central de Gestão de Riscos Corporativos</span> — Curso desenvolvido para formação executiva em transição de carreira</footer>

<script>
const MODULES = [
  {n:1, title:"Fundamentos da Gestão de Riscos", live:true,
   topics:["O que é risco","Risco x perigo x ameaça x oportunidade","Por que empresas gerenciam riscos","Como grandes empresas usam gestão de riscos","O papel do Gestor de Riscos"]},
  {n:2, title:"Tipos de Riscos Corporativos", live:false,
   topics:["Estratégicos","Financeiros","Operacionais","Compliance","Jurídicos","Reputacionais","ESG","Cibernéticos","Projetos","Supply Chain","Fraudes"]},
  {n:3, title:"Introdução à ISO 31000", live:false,
   topics:["História e objetivo","Estrutura da norma","Princípios","Framework e liderança","Processo: contexto, identificação, análise, avaliação, tratamento","Comunicação e monitoramento","Estudo de caso guiado"]},
  {n:4, title:"ISO 31000 na Prática", live:false,
   topics:["Mapas e fluxogramas","Templates e checklists","Matriz de risco","Heat map","KRIs","KPIs de risco"]},
  {n:5, title:"COSO ERM", live:false,
   topics:["História e objetivos","Estrutura em 5 componentes","Governança e cultura","Estratégia e definição de objetivos","Performance","Revisão e comunicação"]},
  {n:6, title:"Comparativo ISO 31000 × COSO ERM", live:false,
   topics:["Quando usar cada framework","Vantagens e limitações","Empresas que utilizam cada modelo","Integração dos dois modelos"]},
  {n:7, title:"Gestão de Riscos em Projetos", live:false,
   topics:["Riscos segundo o PMBOK","Registro de riscos","Matriz probabilidade x impacto","Estratégias de resposta","Monitoramento contínuo"]},
  {n:8, title:"Ferramentas de Análise de Risco", live:false,
   topics:["Bow Tie","SWOT","PESTEL","FMEA","FTA","Árvore de decisão","5 Porquês","Ishikawa","Simulação de Monte Carlo","Matriz P × I"]},
  {n:9, title:"Construindo um Sistema de Gestão de Riscos", live:false,
   topics:["Políticas e documentos","Indicadores","Governança e comitês","Papéis e responsabilidades","Implantação do zero"]},
  {n:10, title:"Estudos de Caso Reais", live:false,
   topics:["Vale","Petrobras","Toyota","Amazon","Magazine Luiza","Transportadoras brasileiras","Seguradoras","Bancos"]},
  {n:11, title:"Entrevistas de Emprego em Gestão de Riscos", live:false,
   topics:["Perguntas sobre ISO 31000","Perguntas sobre COSO","Governança e compliance","Estudos de caso em entrevista","Como apresentar resultados"]},
  {n:12, title:"Projeto Final", live:false,
   topics:["Política de gestão de riscos","Matriz e heat map","Plano de tratamento","Indicadores e dashboard executivo","Relatório para diretoria"]},
];

const LESSONS = [
{
  id:1, title:"O que é risco?", duration:"12 min", level:"Introdutório",
  content:[
    "Um motorista experiente sente quando uma rota está perigosa antes de qualquer coisa acontecer — pelo horário, pelo trecho, pelo tipo de carga. Isso já é gestão de risco na prática, só que sem o nome técnico. O objetivo deste curso é dar nome, estrutura e método para essa percepção que você provavelmente já tem depois de anos de operação.",
    "Na linguagem corporativa, <strong>risco é o efeito da incerteza sobre os objetivos de uma organização</strong>. Repare que a definição não fala em \"coisa ruim que pode acontecer\" — fala em incerteza. Isso importa porque risco não é sinônimo de problema. Problema é algo que já aconteceu e precisa ser resolvido. Risco é o que ainda pode acontecer, para o bem ou para o mal, e que afeta se a empresa vai atingir o que se propôs a atingir.",
    "Na prática do dia a dia de GRIS, risco costuma ser tratado como uma equação simples: <strong>Risco = Probabilidade × Impacto</strong>. Um trecho de rodovia com histórico baixo de ocorrências, mas que transporta eletrônicos de alto valor, tem probabilidade baixa e impacto altíssimo — o resultado ainda é um risco relevante, mesmo sem estatística alarmante. Já um pátio com furtos pequenos e recorrentes tem probabilidade alta e impacto baixo por evento, mas que se acumula ao longo do ano. São dois perfis de risco completamente diferentes, e cada um exige um tratamento diferente.",
    "É essencial separar risco de <strong>sinistro</strong>. Sinistro é o risco que já se materializou — o roubo que aconteceu, a avaria que foi registrada, o atraso que gerou multa contratual. Um setor de GRIS maduro não existe para contar sinistros depois que eles acontecem; existe para atuar antes, reduzindo a frequência e a severidade do que ainda pode acontecer. Quando uma operação só reage a sinistros, ela está fazendo gestão de perdas, não gestão de risco.",
    "Vale reforçar também que risco não é sempre negativo. A definição técnica inclui os dois lados: <strong>ameaça</strong> (risco negativo, que gera perda) e <strong>oportunidade</strong> (risco positivo, que gera ganho). Uma empresa que se antecipa a uma mudança regulatória — como o Decreto 13.012/2026, que trata da Lei 14.967/2024 sobre segurança privada — e já chega adequada quando a norma entra em vigor transformou incerteza regulatória em vantagem competitiva. Isso também é gestão de risco.",
    "É por isso que grandes embarcadores de e-commerce, como Shopee e Mercado Livre, passaram a exigir estrutura formal de GRIS de seus parceiros logísticos como pré-requisito contratual: eles não estão comprando um serviço de segurança, estão comprando previsibilidade sobre um conjunto de incertezas que, se não geridas, viram custo direto na operação deles."
  ],
  resumo:[
    "Risco é o efeito da incerteza sobre os objetivos — não é sinônimo de problema.",
    "A leitura mais usada no dia a dia é Risco = Probabilidade × Impacto.",
    "Sinistro é o risco já materializado; GRIS atua antes disso, não depois.",
    "Risco pode ser negativo (ameaça) ou positivo (oportunidade).",
    "Estrutura formal de GRIS virou pré-requisito contratual em operações de e-commerce de alta escala."
  ],
  conceitos:[
    {term:"Risco", def:"Efeito da incerteza sobre os objetivos da organização."},
    {term:"Incerteza", def:"Ausência, mesmo que parcial, de informação sobre um evento futuro."},
    {term:"Probabilidade", def:"Chance de um evento de risco ocorrer em determinado período."},
    {term:"Impacto", def:"Magnitude do efeito do evento sobre os objetivos da empresa."},
    {term:"Sinistro", def:"Risco que se materializou — o evento já ocorreu."},
    {term:"Apetite ao risco", def:"Nível de risco que a organização aceita assumir para atingir seus objetivos."}
  ],
  erros:[
    "Tratar risco como sinônimo de problema ou de sinistro já ocorrido.",
    "Acreditar que existe operação com \"risco zero\" — toda decisão envolve alguma incerteza.",
    "Analisar todos os riscos com a mesma régua, sem diferenciar probabilidade de impacto.",
    "Só olhar para o lado negativo do risco e ignorar oportunidades geradas pela incerteza."
  ],
  exercicio:"Liste três riscos reais da sua rotina profissional atual (ou da última operação que você geriu). Para cada um, classifique a probabilidade (baixa, média, alta) e o impacto (baixo, médio, alto) separadamente, antes de decidir o que fazer com eles. Evite pular direto para a solução — o exercício é treinar a leitura antes da reação.",
  quiz:[
    {q:"Qual é a definição mais precisa de risco em gestão corporativa?", opts:["Um problema que já aconteceu","O efeito da incerteza sobre os objetivos","Um evento sempre negativo","Sinônimo de perigo"], correct:1},
    {q:"A leitura mais usada de risco no dia a dia operacional é:", opts:["Probabilidade + Custo","Impacto ÷ Frequência","Probabilidade × Impacto","Frequência × Multa contratual"], correct:2},
    {q:"O que diferencia risco de sinistro?", opts:["Nada, são sinônimos","Sinistro é o risco que já se materializou","Risco só existe em contratos de seguro","Sinistro é sempre financeiramente menor que o risco"], correct:1},
    {q:"Uma transportadora que investe em rastreamento veicular está, no vocabulário de GRIS, principalmente:", opts:["Aceitando o risco","Tratando o risco","Ignorando o risco","Transferindo 100% do risco a terceiros"], correct:1},
    {q:"Apetite ao risco é:", opts:["O valor do prêmio de seguro contratado","O nível de risco que a empresa aceita assumir para atingir seus objetivos","A quantidade de sinistros registrados no mês","Um índice financeiro fixo definido por lei"], correct:1},
    {q:"Risco, na definição técnica usada neste curso, pode ser:", opts:["Somente negativo","Somente positivo","Negativo (ameaça) ou positivo (oportunidade)","Inexistente em empresas bem geridas"], correct:2},
    {q:"Por que \"risco zero\" não existe na prática empresarial?", opts:["Porque toda empresa eventualmente quebra","Porque sempre há algum grau de incerteza envolvido em qualquer objetivo","Porque seguros cobrem qualquer perda","Porque não é permitido por lei"], correct:1},

{
  id:2, title:"Risco, perigo, ameaça e oportunidade", duration:"11 min", level:"Introdutório",
  content:[
    "Esses quatro termos são usados quase como sinônimos no dia a dia da operação, mas em gestão de riscos corporativos cada um tem um papel específico. Confundi-los é um dos erros mais comuns de quem está migrando de uma função puramente operacional para uma função de gestão de risco formal — e é justamente esse tipo de confusão que separa uma resposta de entrevista genérica de uma resposta técnica.",
    "<strong>Perigo</strong> (ou fonte de risco) é qualquer condição, objeto ou situação com potencial de causar dano — ele existe independentemente de haver alguém para explorá-lo. Uma rodovia com histórico de assaltos é um perigo. Um motorista sem treinamento adequado para carga de alto valor é um perigo. Um pátio sem controle de acesso é um perigo. O perigo é a fonte; ele pode ficar latente por anos sem gerar nenhum evento.",
    "<strong>Ameaça</strong> é mais específica: é a intenção, capacidade ou situação concreta que pode explorar um perigo existente. Uma quadrilha especializada em roubo de carga, com informação privilegiada sobre determinada rota, é uma ameaça ativa sobre o perigo \"rodovia vulnerável\". Nem todo perigo tem uma ameaça ativa no momento — mas quando ela aparece, a probabilidade do risco sobe de forma abrupta.",
    "<strong>Risco</strong>, como vimos na aula anterior, é a combinação entre o perigo, a ameaça e a chance real de isso afetar os objetivos do negócio, medida em probabilidade e impacto. É o conceito que une os outros dois a uma consequência mensurável para a empresa.",
    "<strong>Oportunidade</strong> é o lado espelhado dessa mesma lógica: uma condição de incerteza que, se bem aproveitada, gera ganho em vez de perda. Antecipar uma mudança regulatória, adotar uma tecnologia de rastreamento antes da concorrência, ou fechar um contrato de GRIS mais vantajoso durante uma renegociação são exemplos de oportunidade dentro da mesma estrutura de análise de incerteza.",
    "Uma forma simples de organizar isso mentalmente: perigo é a fonte, ameaça é o gatilho potencial, risco é a consequência calculada, e oportunidade é a versão positiva dessa mesma consequência. Um gestor de riscos maduro mapeia os quatro — não só o risco final — porque tratar a fonte (o perigo) costuma ser mais barato e mais eficaz do que tratar apenas a consequência depois que ela já está formada."

{
  id:3, title:"Por que empresas gerenciam riscos?", duration:"13 min", level:"Introdutório",
  content:[
    "Se gestão de risco fosse só uma boa prática opcional, poucas empresas investiriam tempo e orçamento nela. Na realidade, existem motivos concretos e mensuráveis — a maioria deles, aliás, aparece direto na conta de resultado. Entender esses motivos é o que permite a um gestor de GRIS justificar orçamento perante a diretoria, em vez de depender apenas do argumento de \"é mais seguro\".",
    "O primeiro motivo é <strong>continuidade do negócio</strong>. Uma operação de transporte que sofre um roubo de carga de grande valor não perde só o produto — perde tempo de frota parada, gera investigação, pode perder o contrato com o embarcador e sofrer penalidade contratual. Gestão de risco existe para que a empresa continue operando de forma previsível, mesmo diante de eventos adversos.",
    "O segundo motivo é <strong>exigência contratual</strong>. Como já vimos, grandes embarcadores de e-commerce de alta escala — casos como Shopee e Mercado Livre — hoje exigem estrutura formal de GRIS como pré-requisito para fechar ou manter contrato com transportadoras parceiras. Não ter uma área de risco estruturada, hoje, é o mesmo que ficar fora de determinados processos de licitação antes mesmo de a proposta comercial ser avaliada.",
    "O terceiro motivo é <strong>redução direta de custo</strong>. Sinistros geram prejuízo direto (a carga perdida), prejuízo indireto (indenização, multa, tempo de gestão) e prejuízo futuro (aumento do prêmio de seguro na renovação da apólice). Uma área de GRIS bem estruturada reduz esses três níveis simultaneamente — e o resultado costuma ser mensurável em reais por ano, o que facilita muito a conversa com diretoria e board.",
    "O quarto motivo é <strong>compliance regulatório</strong>. No Brasil, o setor de transporte de cargas e segurança privada é regulado por normas específicas — da ANTT em questões de transporte rodoviário até legislações mais recentes de segurança privada, como o Decreto 13.012/2026, que regulamenta a Lei 14.967/2024. Ignorar essas exigências não é só um risco reputacional: pode gerar autuação, restrição operacional e, em casos mais graves, impedimento de operar.",
    "O quinto motivo, menos falado mas cada vez mais relevante, é <strong>reputação e vantagem competitiva</strong>. Em um mercado onde clientes corporativos avaliam fornecedores por maturidade de gestão de risco antes de assinar contrato, ter um sistema de GRIS estruturado — com indicadores, matriz de risco e histórico de resultados — vira argumento comercial, não só operacional."

    "Sinistros geram custo direto, indireto e futuro (via aumento de prêmio de seguro).",

  conceitos:[

    {term:"Custo indireto do sinistro", def:"Gastos gerados por um evento além da perda direta: investigação, gestão de crise, tempo parado."},
    {term:"Compliance", def:"Conformidade da operação com leis, normas e regulamentos aplicáveis ao setor."},

  quiz:[

    {q:"Grandes embarcadores de e-commerce passaram a exigir GRIS estruturado de parceiros logísticos principalmente como:", opts:["Item decorativo do contrato","Pré-requisito para fechar ou manter o contrato","Exigência exclusiva de TI","Sugestão opcional sem peso comercial"], correct:1},
    {q:"O custo de um sinistro para a empresa inclui, além da perda direta:", opts:["Somente o valor do produto perdido","Custo indireto (gestão, investigação) e custo futuro (prêmio de seguro)","Nenhum custo adicional relevante","Apenas custos jurídicos"], correct:1},

  caso:"Uma transportadora de médio porte perde um contrato importante com um marketplace não por causa de um sinistro grave, mas porque, durante a homologação, não conseguiu apresentar matriz de risco, indicadores de sinistralidade nem plano de tratamento formal — exigências que já eram padrão no processo de qualificação de fornecedores. O concorrente que fechou o contrato tinha sinistralidade histórica até parecida, mas apresentou governança de risco estruturada. O caso ilustra que, em determinados setores, ausência de estrutura formal de GRIS já é, por si só, um risco comercial direto.",

{

  content:[
    "Cada setor aplica gestão de riscos com um sotaque próprio, mas a lógica de fundo é a mesma: identificar, medir, priorizar e monitorar aquilo que pode afetar os objetivos do negócio. Olhar para como diferentes indústrias fazem isso ajuda a enxergar para onde a área de GRIS em logística está caminhando — porque, historicamente, ela vem se profissionalizando a partir do que bancos e seguradoras já fazem há décadas.",
    "Bancos trabalham com estruturas de risco extremamente maduras, em geral apoiadas em frameworks internacionais de capital e risco operacional. O ponto central para quem vem de logística não é decorar esses frameworks, mas entender o princípio: toda decisão relevante passa por uma análise formal de risco antes de ser aprovada, com responsáveis claros e limites definidos.",
    "Seguradoras vivem de precificar risco. Elas usam o conceito de <strong>apetite ao risco</strong> de forma extremamente prática: quanto maior o risco percebido de uma operação de transporte (rota, tipo de carga, histórico de sinistros), maior o prêmio cobrado. Entender essa lógica é decisivo para quem trabalha do lado do embarcador ou da transportadora, porque cada melhoria mensurável em GRIS pode ser usada como argumento de negociação na renovação da apólice.",
    "Indústrias, principalmente as reguladas, trabalham com <strong>PGR — Plano de Gerenciamento de Risco</strong> — documentos formais que mapeiam riscos operacionais, ambientais e de segurança do trabalho, com planos de ação vinculados. A lógica de documentar, formalizar e vincular plano de ação a cada risco identificado é diretamente aplicável a qualquer área de GRIS em logística.",
    "No universo de e-commerce e operações de alta escala — onde muitos profissionais de GRIS em logística estão migrando hoje — a gestão de risco se expressa através de <strong>torres de controle</strong>: estruturas que monitoram em tempo real indicadores operacionais (SLA, ocorrências, desvios de rota), cruzam esses dados com KRIs de risco e acionam resposta antes que um desvio pequeno vire um sinistro grande. Ferramentas como Power BI, TMS e plataformas de rastreamento (telemetria) são o motor técnico por trás dessa vigilância contínua.",
    "O ponto comum entre todos esses setores é que gestão de risco madura não é um relatório mensal — é um <strong>ciclo contínuo</strong>: identificar, medir, tratar, monitorar, reportar e recalibrar. Empresas que tratam GRIS como evento pontual (uma auditoria anual, por exemplo) tendem a operar reativamente; empresas que tratam como ciclo contínuo antecipam problemas antes que eles apareçam no resultado."

    "Indústrias reguladas formalizam risco através do PGR, com planos de ação vinculados a cada item.",

    "Gestão de risco madura é um ciclo contínuo, não um evento pontual."

  conceitos:[

    {term:"Torre de controle", def:"Estrutura de monitoramento em tempo real de indicadores operacionais e de risco."},

let state = { activeModule:1, activeLesson:1, done:{}, quizChecked:false };

function renderManifest(){
  const el = document.getElementById('manifest');
  let html = `<div class="manifest-head">
      <span class="eyebrow">Manifesto do curso</span>
      <p>12 módulos, do fundamento ao projeto final. Módulo 01 disponível na íntegra — os demais seguem a mesma estrutura de aula, quiz, estudo de caso e preparação para entrevista.</p>
    </div>`;
  MODULES.forEach(m=>{
    const active = m.n === state.activeModule ? 'active' : '';
    html += `<button class="mod-row ${active}" onclick="selectModule(${m.n})">
      <div class="row-top">
        <span class="mod-num">Módulo ${String(m.n).padStart(2,'0')}</span>
        <span class="pill ${m.live?'live':'soon'}">${m.live?'Disponível':'Em breve'}</span>
      </div>
      <p class="mod-title">${m.title}</p>
    </button>`;
    if(m.n === state.activeModule && m.live){
      html += `<div class="lesson-list">`;
      LESSONS.forEach(l=>{
        const lact = l.id === state.activeLesson ? 'active':'';
        const ldone = state.done[l.id] ? 'done':'';
        html += `<button class="lesson-item ${lact} ${ldone}" onclick="selectLesson(${l.id})">
          <span class="lesson-dot">${state.done[l.id]?'<i>✓</i>':''}</span>
          <span>Aula ${l.id} — ${l.title}</span>
        </button>`;
      });
      html += `</div>`;
    }
  });
  el.innerHTML = html;
}

function renderLocked(mod){
  const chips = mod.topics.map(t=>`<div class="topic-chip">${t}</div>`).join('');
  document.getElementById('main').innerHTML = `
    <div class="locked-doc">
      <span class="eyebrow">Módulo ${String(mod.n).padStart(2,'0')} · Estrutura do curso</span>
      <h2>${mod.title}</h2>
      <p>Este módulo faz parte da estrutura completa do curso e segue o mesmo padrão do Módulo 01: aulas em microformato, resumo, conceitos-chave, erros comuns, exercício prático, quiz de 10 perguntas, estudo de caso e preparação para entrevista.</p>
      <div class="topics-grid">${chips}</div>
      <div class="lock-note"><span>&#9679;</span> Conteúdo completo liberado nas próximas entregas do curso</div>
    </div>`;
}

function renderLesson(l){
  const conceptCards = l.conceitos.map(c=>`<div class="concept-card"><p class="term">${c.term}</p><p class="def">${c.def}</p></div>`).join('');
  const erroBoxes = l.erros.map(e=>`<div class="warn-box"><p><strong>Erro comum —</strong> ${e}</p></div>`).join('');
  const glossary = l.glossario.map(g=>`<div class="glossary-item"><p class="g-term">${g.term}</p><p class="g-def">${g.def}</p></div>`).join('');
  const interview = l.entrevista.map(q=>`<div class="interview-item"><p class="interview-q">${q.q}</p><p class="interview-a">${q.tip}</p></div>`).join('');
  const quizItems = l.quiz.map((q,qi)=>{
    const opts = q.opts.map((o,oi)=>`<label class="quiz-opt" data-qi="${qi}" data-oi="${oi}">
        <input type="radio" name="q${qi}" value="${oi}"><span>${o}</span>
      </label>`).join('');
    return `<div class="quiz-item">
        <p class="quiz-q"><span>${String(qi+1).padStart(2,'0')}</span>${q.q}</p>
        ${opts}
      </div>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="doc">
      <span class="eyebrow">Aula ${String(l.id).padStart(2,'0')} · Módulo 01 — Fundamentos da Gestão de Riscos</span>
      <h2 class="display">${l.title}</h2>
      <div class="doc-meta">
        <div>Duração<strong>${l.duration}</strong></div>
        <div>Nível<strong>${l.level}</strong></div>
        <div>Formato<strong>Microaula + prática</strong></div>
      </div>
      ${l.content.map(p=>`<p>${p}</p>`).join('')}

      <p class="section-label">Resumo</p>
      <ul class="doc-list">${l.resumo.map(r=>`<li>${r}</li>`).join('')}</ul>

      <p class="section-label">Conceitos-chave</p>
      <div class="concept-grid">${conceptCards}</div>

      <p class="section-label">Erros mais comuns</p>
      ${erroBoxes}

      <p class="section-label">Exercício prático</p>
      <div class="task-box"><p>${l.exercicio}</p></div>

      <p class="section-label">Quiz — 10 perguntas</p>
      <div id="quiz-body">${quizItems}</div>
      <div class="quiz-actions">
        <button class="btn-check" onclick="checkQuiz()">Corrigir quiz</button>
        <span id="quiz-score"></span>
      </div>

      <p class="section-label">Estudo de caso</p>
      <div class="case-box"><span class="eyebrow">Cenário real de operação</span><p>${l.caso}</p></div>

      <p class="section-label">Glossário</p>
      ${glossary}

      <p class="section-label">Perguntas de entrevista</p>
      ${interview}
    </div>`;

  state.done[l.id] = true;
  updateRadar();
  renderManifest();
}

function checkQuiz(){
  const lesson = LESSONS.find(l=>l.id===state.activeLesson);
  let correctCount = 0;
  lesson.quiz.forEach((q,qi)=>{
    const selected = document.querySelector(`input[name="q${qi}"]:checked`);
    const opts = document.querySelectorAll(`.quiz-opt[data-qi="${qi}"]`);
    opts.forEach(o=>{
      const oi = parseInt(o.getAttribute('data-oi'));
      o.classList.remove('correct','wrong');
      if(oi === q.correct){ o.classList.add('correct'); }
      else if(selected && parseInt(selected.value) === oi){ o.classList.add('wrong'); }
    });
    if(selected && parseInt(selected.value) === q.correct) correctCount++;
  });
  document.getElementById('quiz-score').innerHTML = `Resultado: <strong>${correctCount}/10</strong> respostas corretas`;
}

function updateRadar(){
  const total = LESSONS.length;
  const doneCount = Object.keys(state.done).length;
  const circumference = 169.6;
  const offset = circumference - (circumference * (doneCount/total));
  document.getElementById('ring-fg').style.strokeDashoffset = offset;
  document.getElementById('ring-label').textContent = doneCount + '/' + total;
  document.getElementById('progress-text').textContent = doneCount === 0
    ? 'Nenhuma aula concluída'
    : (doneCount === total ? 'Módulo 01 concluído' : doneCount + ' de ' + total + ' aulas vistas');
}

function selectModule(n){
  state.activeModule = n;
  const mod = MODULES.find(m=>m.n===n);
  if(mod.live){
    if(!LESSONS.find(l=>l.id===state.activeLesson)) state.activeLesson = 1;
    renderManifest();
    renderLesson(LESSONS.find(l=>l.id===state.activeLesson));
  } else {
    renderManifest();
    renderLocked(mod);
  }
  window.scrollTo({top:0,behavior:'smooth'});
}

function selectLesson(id){
  state.activeLesson = id;
  renderManifest();
  renderLesson(LESSONS.find(l=>l.id===id));
  window.scrollTo({top:0,behavior:'smooth'});
}

renderManifest();
renderLesson(LESSONS[0]);
</script>
